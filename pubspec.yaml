name: insect_detector
description: اپلیکیشن تشخیص حشرات استان چهارمحال و بختیاری
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.11.0
  image_picker: ^1.0.7
  image: ^4.2.0
  cupertino_icons: ^1.0.2
  connectivity_plus: ^6.0.0
  sqflite: ^2.3.0
  path: ^1.8.3
  mailer: ^6.1.1
  path_provider: ^2.1.0
  share_plus: ^7.2.0
  workmanager: ^0.5.1
  permission_handler: ^11.4.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/QU_Pests_119Classes_float16.tflite
    - assets/labels.txt
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/app_icon.png"
